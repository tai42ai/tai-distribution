apiVersion: v1
kind: Pod
metadata:
  name: {{ include "tai.fullname" . }}-test-ready
  labels:
    {{- include "tai.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  {{- with .Values.imagePullSecrets }}
  imagePullSecrets:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- /* The SAME restricted-compliant securityContext as the app pods — an
         unadorned test pod is rejected by the restricted namespace and reads as
         a false negative. */}}
  securityContext:
    {{- toYaml .Values.podSecurityContext | nindent 4 }}
  containers:
    - name: test-ready
      {{- /* curlimages/curl, NOT the app image: python:3.13-slim ships no curl. */}}
      image: "{{ .Values.tests.image.repository }}:{{ .Values.tests.image.tag }}"
      imagePullPolicy: {{ .Values.tests.image.pullPolicy }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      command:
        - curl
        - -fsS
        - --max-time
        - "10"
        - --retry
        - "30"
        - --retry-connrefused
        - --retry-delay
        - "5"
        - {{ printf "http://%s-serve:%v/ready" (include "tai.fullname" .) .Values.service.port | quote }}
