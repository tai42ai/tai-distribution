{{- if and (not .Values.postgresql.auth.existingSecret) .Values.postgresql.enabled }}
{{- /*
Install-time random Postgres password for the QUICKSTART StatefulSet only. Kept
across upgrades:
  - helm.sh/resource-policy: keep so a helm uninstall/re-render never deletes it,
  - a lookup of the live Secret reuses the existing password on upgrade so it is
    not rotated (which would break the running DB and every app connection).
No working default lives in values.yaml — this is the sole source of the
quickstart credential, and the same Secret feeds both the DB StatefulSet and the
app env so they cannot drift. An EXTERNAL Postgres owns its own password, so the
chart never generates one for it — tai.dbSecretName instead requires
postgresql.auth.existingSecret in that shape.

Caveat for GitOps (`helm template | kubectl apply`): the lookup returns nothing
without a live cluster connection, so every render mints a NEW random password.
For GitOps supply postgresql.auth.existingSecret instead of relying on this.
*/}}
{{- $secretName := printf "%s-db" (include "tai.fullname" .) }}
{{- $key := include "tai.dbSecretKey" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $password := "" }}
{{- if and $existing $existing.data (index $existing.data $key) }}
{{- $password = index $existing.data $key | b64dec }}
{{- else }}
{{- $password = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "tai.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  {{ $key }}: {{ $password | quote }}
{{- end }}
