{{- if and .Values.metrics.enabled .Values.metrics.serviceMonitor.enabled }}
{{- /*
Requires the prometheus-operator ServiceMonitor CRD in the cluster (a documented
prerequisite, not bundled). Restricted to the serve and backend Services by
component so it never matches the quickstart Postgres/Redis headless Services
(which share the name/instance selector labels but expose no metrics port).
*/}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "tai.fullname" . }}
  labels:
    {{- include "tai.labels" . | nindent 4 }}
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "tai.selectorLabels" . | nindent 6 }}
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values:
          - serve
          - backend
  endpoints:
    - port: metrics
      path: {{ .Values.metrics.serviceMonitor.path }}
      interval: {{ .Values.metrics.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.metrics.serviceMonitor.scrapeTimeout }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
{{- end }}
