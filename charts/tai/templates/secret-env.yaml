{{- if not .Values.config.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tai.envSecretName" . }}
  labels:
    {{- include "tai.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- if eq .Values.config.mode "k8s" }}
  {{/* k8s config provider reads each env var as its own Secret key. */}}
  {{- range $k, $v := .Values.config.env }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- else }}
  {{/* file mode: one .env file mounted at /app/.env. */}}
  .env: |
    {{- range $k, $v := .Values.config.env }}
    {{ $k }}={{ $v }}
    {{- end }}
{{- end }}
{{- end }}
