# ci fixture: external-everything.
# The hosted-prod / bring-your-own-infra shape: no quickstart DBs,
# every dependency an external endpoint, secrets supplied via existing objects,
# ingress + HPA + PDB + ServiceMonitor on, k8s config mode.

image:
  tag: "0.1.0"

serve:
  replicaCount: 3
  workers: 4
  statelessHttp: true
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
  pdb:
    enabled: true
    minAvailable: 2

backend:
  replicaCount: 2

metrics:
  serviceMonitor:
    enabled: true

ingress:
  enabled: true
  className: nginx
  host: tai.example.com
  tls:
    - secretName: tai-tls
      hosts:
        - tai.example.com

# k8s config mode: env + manifest read from a Secret/ConfigMap via the API.
config:
  mode: k8s
  existingSecret: tai-env
  existingConfigMap: tai-manifest

# All PG-backed features on, wired to the external Postgres.
features:
  accessControl:
    enabled: true
  versioning:
    enabled: true
  accounts:
    enabled: true
  connectors:
    enabled: true
  marketplace:
    enabled: true

postgresql:
  enabled: false
  host: postgres.internal
  port: 5432
  database: tai
  username: tai
  auth:
    existingSecret: tai-db-external
    existingSecretKey: postgres-password

redis:
  enabled: false
  host: redis.internal
  port: 6379
  database: 0
  auth:
    enabled: true
    existingSecret: tai-redis-external
    existingSecretKey: redis-password
