# Celery/kombu declares transient (non-durable) non-exclusive queues for its
# control-plane mailbox and reply queues; RabbitMQ 4 denies that deprecated
# feature by default (Queue.declare -> 541 INTERNAL_ERROR), which stops every
# celery stack from booting. Permit it so the celery leg runs. Merged with the
# image's conf.d defaults, which stay in effect.
deprecated_features.permit.transient_nonexcl_queues = true
